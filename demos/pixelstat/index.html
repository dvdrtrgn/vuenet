<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="../demos.css">
  <title>Testing PixelStat</title>
  <style>
    #Code {
      position: relative;
    }
    #Code::before,
    #Code::after {
      color: red;
      display: block;
      font-size: large;
      position: absolute;
      text-align: center;
      top: 0;
      width: 100%;
    }
    #Code::before {
      content: 'class attribute... ' attr(class);
    }
  </style>
</head>

<body>
  <h1>Testing PixelStat</h1>
  <p>
    Make new <code>PixelStat</code> for viewport properties
    <br>
    Call <code>watchWindow([element])</code> have it always updating
    <br>
    [if you send in a dom element it will receive classes]
  </p>
  <p>
    <a href="./PixelStat.js" target="_blank">PixelStat.js</a>
    <!-- helper functions
    <code>[mockReq, procReq, que]</code>.
    <br>
    <i>See console...</i> -->
  </p>

  <div class="scrollshade">
    <pre id="Code">dump script</pre>
  </div>

  <script type="module" id="Test">

    import PixelStat from './PixelStat.js';

    const pixst = window.pixst = new PixelStat();
    const divel = document.querySelector('#Code');

    pixst.watchWindow();

    pixst.watchWindow(divel);

  </script>

  <script>
    const $ = document.querySelector.bind(document);

    $('#Code').textContent = $('#Test').textContent;
  </script>

  <script id="Tnav" type="module" src='../Tnav.js'></script>
</body>

</html>
